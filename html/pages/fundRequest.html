
<!-- Page Body -->
<div class="request-wrapper">

            <!-- Fund Card -->
            <div class="card fund-card">
                <h2><i class="fa-solid fa-indian-rupee-sign"></i> Fund Request</h2>

                <form>
                    <div class="form-group">
                        <label for="sel-bank">Select Bank</label>
                        <select id="sel-bank" required>
                            <option value="">Select Bank</option>
                            <option>HDFC Bank</option>
                            <option>ICICI Bank</option>
                            <option>SBI</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" placeholder="Enter Amount" required>
                    </div>

                    <div class="form-group">
                        <label>Reference Number</label>
                        <input type="text" placeholder="Enter Reference Number" required>
                    </div>

                    <div class="form-group">
                        <label for="ref-date">Reference Date</label>
                        <input id="ref-date" type="date" required>
                    </div>

                    <div class="form-group">
                        <label for="ref-img">Reference Image</label>
                        <input id="ref-img" type="file">
                    </div>

                    <button type="submit" class="btn">
                        <i class="fa-solid fa-paper-plane"></i> Submit Request
                    </button>
                </form>
            </div>

            <!-- History Card -->
            <div class="card history-card">
                <h2><i class="fa-solid fa-clock-rotate-left"></i> Past Requests</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Transaction ID</th>
                                <th>Amount</th>
                                <th>Ref. Number</th>
                                <th>Ref. Date</th>
                                <th>Request Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr>
                                <td data-label="Transaction ID">TXN1001</td>
                                <td data-label="Amount">₹10,000</td>
                                <td data-label="Ref. Number">87563421</td>
                                <td data-label="Ref. Date">10-02-2026</td>
                                <td data-label="Request Date">12-02-2026</td>
                                <td data-label="Status">
                                    <span class="badge success">Approved</span>
                                </td>
                            </tr>

                            <tr>
                                <td data-label="Transaction ID">TXN1002</td>
                                <td data-label="Amount">₹5,000</td>
                                <td data-label="Ref. Number">99887766</td>
                                <td data-label="Ref. Date">08-02-2026</td>
                                <td data-label="Request Date">09-02-2026</td>
                                <td data-label="Status">
                                    <span class="badge pending">Pending</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

</div>

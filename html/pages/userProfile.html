
<div class="container">

    <!-- LEFT PROFILE CARD -->
    <div class="profile-card">
        <img src="https://i.pravatar.cc/150" class="profile-img">

        <h2 id="displayName">Durgesh Singh</h2>
        <p>SH</p>
        <p>SH80817</p>

        <div class="profile-buttons">
            <button class="btn">Download ID</button>
            <button class="btn">Certificate</button>
        </div>
    </div>

    <!-- RIGHT PROFILE DETAILS -->
    <div class="details-card">

        <div class="form-grid">

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" value="Durgesh Singh">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="demo@gmail.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="09641130196">
            </div>

        </div>

        <button class="btn save-btn" onclick="saveProfile()">Save Changes</button>
    </div>

</div>


<!-- KYC SECTION -->
<div class="kyc-card">
    <h2>KYC Details</h2>

    <div class="form-grid">

        <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" name="address" value="Jaipur Engineering College Road">
        </div>

        <div class="form-group">
            <label for="state">State</label>
            <input type="text" id="state" name="state" value="Rajasthan">
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city" value="Jaipur">
        </div>

        <div class="form-group">
            <label for="pincode">Pincode</label>
            <input type="text" id="pincode" name="pincode" value="302028">
        </div>

        <div class="form-group">
            <label for="businessAddress">Business Address</label>
            <input type="text" id="businessAddress" name="businessAddress" value="JEC">
        </div>

    </div>

    <div class="note">
        <strong>Note:</strong> If you update your KYC details, they will be resubmitted for review.
    </div>

    <button class="btn save-btn">Save Changes</button>

</div>

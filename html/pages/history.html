<div class="container">

    <!-- FILTER SECTION -->
    <div class="card filter-card">
        <div class="filter-row">

            <div class="form-group">
                <label for="fromDate">From Date</label>
                <input type="date" id="fromDate" name="fromDate">
            </div>

            <div class="form-group">
                <label for="toDate">To Date</label>
                <input type="date" id="toDate" name="toDate">
            </div>

            <div class="form-group">
                <label for="searchTxn">Transaction ID</label>
                <input type="text" id="searchTxn" name="searchTxn" placeholder="Enter Transaction ID">
            </div>

            <button type="button" class="btn" onclick="searchHistory()">
                <i class="fa fa-search"></i> Search
            </button>



        </div>
    </div>

    <!-- TABLE SECTION -->
    <div class="card history-card">
        <h2><i class="fa-solid fa-clock-rotate-left"></i> Transaction History</h2>

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Txn ID</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="historyTable">
            </tbody>
        </table>
    </div>

</div>

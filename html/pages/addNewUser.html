
<!-- ================= PAGE CONTENT ================= -->
<div class="container">

        <div class="form-card">

          <h2>
            <i class="fa-solid fa-user-plus"></i> User Registration
          </h2>

          <form id="addUserForm">

            <!-- Name -->
            <div class="form-group full">
              <label>Full Name</label>
              <div class="input-box">
                <input type="text" placeholder="Enter full name" required>
              </div>
            </div>

            <!-- Phone -->
            <div class="form-group">
              <label>Phone</label>
              <div class="input-box">
                <input type="text" placeholder="Enter mobile number" required>
              </div>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label>Email</label>
              <div class="input-box">
                <input type="email" placeholder="Enter email address" required>
              </div>
            </div>

            <!-- Package -->
            <div class="form-group full">
              <label for="package">Package</label>
              <div class="input-box">
                <select id="package" required>
                  <option value="">Select Package</option>
                  <option>Retailer</option>
                  <option>Distributor</option>
                  <option>Master Distributor</option>
                </select>
              </div>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label>Password</label>
              <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Enter password" required>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label>Confirm Password</label>
              <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Confirm password" required>
              </div>
            </div>

            <!-- Checkbox -->
            <div class="checkbox-group full">
              <input type="checkbox" id="confirm" required>
              <label for="confirm">Confirm Registration</label>
            </div>

            <!-- Submit Button -->
            <div class="form-group full">
              <button type="submit" class="submit-btn">
                <i class="fa-solid fa-user-check"></i> Register User
              </button>
            </div>

          </form>

        </div>
</div>



    <div class="aeps-wrapper">

    <!-- ================= FORM CARD ================= -->
    <div class="form-card">

        <!-- Top Right Authorization Button -->
        <div class="top-right">
            <button class="authorize-btn" onclick="authorizeUser()">
                <i class="fa-solid fa-shield-check"></i>
                Authorization
            </button>
        </div>

        <div class="form-grid">

            <div class="form-group">
                <label for="bank">Bank</label>
                <select id="bank">
                    <option>State Bank of India</option>
                    <option>State Bank of India</option>
                    <option>Punjab National Bank</option>
                    <option>Bank of Baroda</option>
                    <option>Canara Bank</option>
                    <option>Union Bank of India</option>
                    <option>Bank of India</option>
                    <option>Indian Bank</option>
                    <option>Central Bank of India</option>
                    <option>Indian Overseas Bank</option>
                    <option>UCO Bank</option>
                    <option>Bank of Maharashtra</option>
                    <option>Punjab & Sind Bank</option>

                    <option>HDFC Bank</option>
                    <option>ICICI Bank</option>
                    <option>Axis Bank</option>
                    <option>Kotak Mahindra Bank</option>
                    <option>IndusInd Bank</option>
                    <option>IDBI Bank</option>
                    <option>Federal Bank</option>
                    <option>South Indian Bank</option>
                    <option>Karur Vysya Bank</option>
                    <option>City Union Bank</option>
                    <option>CSB Bank</option>
                    <option>DCB Bank</option>
                    <option>Bandhan Bank</option>
                    <option>RBL Bank</option>
                    <option>IDFC First Bank</option>
                    <option>Yes Bank</option>

                    <option>Airtel Payments Bank</option>
                    <option>India Post Payments Bank</option>
                    <option>Paytm Payments Bank</option>
                    <option>Fino Payments Bank</option>
                    <option>Jio Payments Bank</option>

                    <option>AU Small Finance Bank</option>
                    <option>Equitas Small Finance Bank</option>
                    <option>Ujjivan Small Finance Bank</option>
                    <option>ESAF Small Finance Bank</option>
                    <option>Suryoday Small Finance Bank</option>
                    <option>Utkarsh Small Finance Bank</option>
                    <option>Jana Small Finance Bank</option>
                    <option>North East Small Finance Bank</option>
                    <option>Capital Small Finance Bank</option>

                </select>
                
            </div>

            <div class="form-group">
                <label>Customer No</label>
                <input type="text" placeholder="Customer No" required>
            </div>

            <div class="form-group">
                <label>Aadhar No</label>
                <input type="text" placeholder="Aadhar Number" required>
                
            </div>

            <div class="form-group">
                <label for="amount">Amount</label>
                <input id="amount" type="number" value="0">
            </div>

        </div>

        <!-- Consent -->
        <div class="consent-box">
            <input type="checkbox" id="consent">
            <label for="consent">
                I am providing my consent to azzunique for using my Aadhaar Number and Finger Print 
                for authorization of this transaction.
            </label>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn">Balance Enquiry</button>
            <button class="action-btn">Mini Statement</button>
            <button class="action-btn">Cash Withdrawal</button>
        </div>

    </div>


    <!-- ================= TABLE SECTION ================= -->
    <div class="table-card">

        <div class="table-header">
            <h3>AEPS</h3>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Txn Id / Date</th>
                        <th>Service Info</th>
                        <th>Agent Info</th>
                        <th>Req Amount</th>
                        <th>Amount / Wallet</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="6" class="no-data">
                            No data available in table
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>


<div class="support-wrapper">

  <div class="support-card">

    <!-- Header -->
    <h2><i class="fa-solid fa-headset "></i> Support Ticket</h2>

    <!-- Contact Box -->
    <div class="contact-box">
      <h4>Contact Support</h4>
      <p><i class="fa-solid fa-envelope"></i> info@azzunique.com</p>
      <p><i class="fa-solid fa-phone"></i> 7412066477</p>
    </div>

    <!-- Form -->
    <form>

      <!-- Service -->
      <div class="form-group">
        <label for="services">Service</label>
        <div class="input-box">
          <i class="fa-solid fa-gear"></i>
          <select id="services" required>
            <option value="">Select Service</option>
            <option>Recharge</option>
            <option>DMT</option>
            <option>Payout</option>
            <option>BBPS</option>
          </select>
        </div>
      </div>

      <!-- Transaction ID -->
      <div class="form-group">
        <label>Transaction ID</label>
        <div class="input-box">
          <i class="fa-solid fa-hashtag"></i>
          <input type="text" placeholder="Enter transaction ID">
        </div>
      </div>

      <!-- Message -->
      <div class="form-group full">
        <label>Message</label>
        <div class="textarea-box">
          <textarea rows="4" placeholder="Write your issue here..." required></textarea>
        </div>
      </div>

      <!-- Button -->
      <div class="form-group full">
        <button type="submit" class="submit-btn">
          </i> Save Changes
        </button>
      </div>

    </form>

  </div>
</div>

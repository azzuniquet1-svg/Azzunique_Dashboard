<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azzunique</title>
    <link rel="stylesheet" href="../css/forgetPass.css">
    <link rel="icon" href="../assests/AzzuniqueLogo.png">
</head>

<body >
<div class="logo-img">
        <img src="../assets/AzzuniqueLogo.png" alt="">
</div>
<div class="login-wrapper">



  <div class="login-card">

    <h1 class="lock">
        <svg class="lock-icon" viewBox="0 0 24 24">
            <path d="M12 2C9.8 2 8 3.8 8 6V9H6C4.9 9 4 9.9 4 11V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V11C20 9.9 19.1 9 18 9H16V6C16 3.8 14.2 2 12 2Z"/>

        </svg>
    </h1>

    <h3 class="pass-heading">Forgot Password?</h3>
    <p class="pass-para">Enter your registered email ID to reset the password</p>
  

    <form method="POST" action="https://reseller.developermode.online/user/login">
      <input type="hidden" name="_token" value="adpLrYBnaL9964maAyXh3jTksXOe4wmqfuwCeBTm">

      <!-- Username -->
      <div class="form-group">
        <label>Email or User ID</label>
        <input 
          type="text" 
          name="username"
          placeholder="Enter your User ID"
          required
        />
      </div>

      <!-- Send -->
      <button type="submit" class="btn-primary">
        Send
      </button>

    </form>

    <!-- Back to Login -->
    <button class="btn-secondary">
      Back to Login
    </button>

    

  </div>
</div>

    
    <script src="../javascript/forgetPass.js"></script>
</body>
</html>
